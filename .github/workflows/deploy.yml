name: Verify and Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    name: Verify (Tests & Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Run Linting
        run: npm run lint
      - name: Run Tests
        run: npm test -- --run

  build-and-deploy:
    name: Build and Deploy
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
